name: Auto-merge

on:
    pull_request:
        types: [opened, reopened, synchronize, ready_for_review]

permissions:
    contents: write
    pull-requests: write

# IMPORTANT: this workflow uses RELEASE_PAT instead of the default GITHUB_TOKEN
# because pushes performed by GITHUB_TOKEN do NOT trigger downstream workflows
# (GitHub anti-recursion safety). With GITHUB_TOKEN, an auto-merged release-please
# PR would land on main without firing CI, which means release-please.yaml
# (workflow_run on CI) would never run and the GitHub release / git tag would not
# be created.
#
# RELEASE_PAT must be a fine-grained Personal Access Token scoped to this repo with:
#   - "Contents: Read and write"
#   - "Pull requests: Read and write"
# Add it under repo Settings -> Secrets and variables -> Actions.
jobs:
    release-please:
        if: ${{ startsWith(github.head_ref, 'release-please--') }}
        runs-on: ubuntu-latest
        steps:
            - run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_PAT }}

    dependabot:
        if: ${{ github.actor == 'dependabot[bot]' }}
        runs-on: ubuntu-latest
        steps:
            - name: Get update metadata
              id: metadata
              uses: dependabot/fetch-metadata@v2
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Auto-merge patch and minor updates
              if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor' }}
              run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_PAT }}
