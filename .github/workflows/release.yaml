name: Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                php-version: ["8.2", "8.3", "8.4"]
                laravel-version: ["^11.0", "^12.0"]
                exclude:
                    - php-version: "8.2"
                      laravel-version: "^12.0"
        name: PHP ${{ matrix.php-version }} / Laravel ${{ matrix.laravel-version }}
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}
                  coverage: none

            - name: Install dependencies
              run: |
                  composer require "illuminate/support:${{ matrix.laravel-version }}" "illuminate/contracts:${{ matrix.laravel-version }}" "illuminate/console:${{ matrix.laravel-version }}" "illuminate/events:${{ matrix.laravel-version }}" --no-interaction --no-update
                  composer update --prefer-dist --no-interaction

            - name: Run tests
              run: ./vendor/bin/pest

    release:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate changelog
              id: changelog
              run: |
                  # Get the previous tag
                  PREVIOUS_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
                  CURRENT_TAG=${GITHUB_REF#refs/tags/}

                  if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
                      echo "body=Initial release" >> "$GITHUB_OUTPUT"
                  else
                      # Generate changelog from commits between tags
                      CHANGELOG=$(git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges)
                      # Write multiline output
                      {
                          echo "body<<EOF"
                          echo "## What's Changed"
                          echo ""
                          echo "$CHANGELOG"
                          echo ""
                          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
                          echo "EOF"
                      } >> "$GITHUB_OUTPUT"
                  fi

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  body: ${{ steps.changelog.outputs.body }}
                  generate_release_notes: true
